name: Test Windows

on:
  workflow_dispatch:  # Chạy thủ công
  push:
    branches: [main]

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -m pip install --upgrade pip
          pip install cmake
          pip install dlib
          pip install -r requirements.txt
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Download models
        env:
          PYTHONIOENCODING: utf-8
        run: |
          echo y | python download_models.py

      - name: Test imports
        env:
          PYTHONIOENCODING: utf-8
        shell: bash
        run: |
          python << 'PYEOF'
          import sys
          print(f'Python: {sys.version}')

          import cv2; print(f'OpenCV: {cv2.__version__}')
          import dlib; print('Dlib: OK')
          import numpy; print(f'NumPy: {numpy.__version__}')
          import scipy; print(f'SciPy: {scipy.__version__}')
          from PIL import Image; print('Pillow: OK')
          import torch; print(f'PyTorch: {torch.__version__}')
          import ultralytics; print(f'Ultralytics: {ultralytics.__version__}')
          import tkinter; print('Tkinter: OK')

          import behavior_detector; print('behavior_detector: OK')
          import license_manager; print('license_manager: OK')

          import os
          models = [
              'models/shape_predictor_68_face_landmarks.dat',
              'models/haarcascade_frontalface_default.xml',
              'models/dlib_face_recognition_resnet_model_v1.dat',
              'yolov8n.pt',
              'alarm.wav',
          ]
          for m in models:
              status = 'OK' if os.path.exists(m) else 'MISSING'
              print(f'  {m}: {status}')

          if os.path.exists('models/resnet_drowsiness.pth'):
              ckpt = torch.load('models/resnet_drowsiness.pth', map_location='cpu', weights_only=False)
              acc = ckpt.get('val_acc', 0)
              print(f'ResNet model: OK (val_acc={acc:.2f}%)')
          else:
              print('ResNet model: NOT FOUND (can train)')

          from behavior_detector import _find_font
          font = _find_font(18)
          print(f'Font: {font}')

          print()
          print('=== TAT CA OK - Windows tuong thich ===')
          PYEOF
